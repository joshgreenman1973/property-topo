<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Property topography &mdash; parcel-shaped 3D terrain</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22e6; --line:#30363d; --txt:#e6edf3; --mut:#8b949e; --accent:#58a6ff; --gold:#e3b341; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; overflow:hidden; }
  #app { position:fixed; inset:0; }
  canvas { display:block; touch-action:none; }
  .caret { cursor:pointer; color:var(--mut); font-size:12px; user-select:none; padding:2px 4px; margin-left:auto; }
  .panel { position:absolute; background:var(--panel); backdrop-filter:blur(12px);
    border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  #controls { top:14px; left:14px; width:294px; max-height:calc(100vh - 28px); overflow-y:auto; }
  #controls h1 { font-size:14px; font-weight:600; margin:0 0 2px; }
  #controls .sub { font-size:11px; color:var(--mut); margin-bottom:12px; }
  .tabs { display:flex; gap:6px; margin-bottom:12px; }
  .tab { flex:1; padding:8px 6px; font-size:12px; text-align:center; cursor:pointer;
    border:1px solid var(--line); border-radius:8px; background:#21262d; color:var(--mut); transition:.15s; }
  .tab.active { background:var(--accent); color:#0d1117; border-color:var(--accent); font-weight:600; }
  .views { margin-bottom:2px; }
  .views .tab { padding:6px 4px; font-size:11px; }
  .views .tab.active { background:#2d4a6d; color:var(--txt); border-color:#3d6291; }
  .facts { font-size:11.5px; line-height:1.6; background:#0d1117aa; border:1px solid var(--line);
    border-radius:8px; padding:8px 10px; margin-bottom:12px; }
  .facts .k { color:var(--mut); display:inline-block; min-width:74px; }
  .facts b { color:var(--txt); }
  .row { display:flex; align-items:center; justify-content:space-between; margin:12px 0 4px; font-size:12px; }
  .row label { color:var(--mut); cursor:help; border-bottom:1px dotted #4c545c; }
  .row .val { font-variant-numeric:tabular-nums; }
  input[type=range] { width:100%; accent-color:var(--accent); margin:0; }
  .toggle { display:flex; align-items:center; gap:8px; font-size:12px; margin:11px 0 2px; cursor:pointer; color:var(--mut); }
  .toggle span { cursor:help; border-bottom:1px dotted #4c545c; }
  .toggle input { accent-color:var(--accent); width:15px; height:15px; }
  .divider { height:1px; background:var(--line); margin:12px 0; }
  #coords { bottom:14px; left:14px; width:294px; font-size:11px; line-height:1.7; }
  #coords h2 { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--mut); margin:0 0 8px; font-weight:600; }
  #coords .cgrid { display:grid; grid-template-columns:auto 1fr; gap:2px 10px; }
  #coords .lbl { color:var(--mut); cursor:help; }
  #coords b { font-variant-numeric:tabular-nums; }
  #legend { position:absolute; bottom:14px; right:14px; width:150px; font-size:10px; color:var(--mut); }
  #legend .bar { height:10px; border-radius:3px; margin:5px 0 3px;
    background:linear-gradient(90deg,#2f6b3f,#6a8f3c,#b8a56b,#96706c,#ecf0f3); }
  #legend .ends { display:flex; justify-content:space-between; }
  #compass { position:absolute; top:14px; right:14px; width:58px; height:58px; cursor:help; }
  #hover { position:absolute; pointer-events:none; background:#000c; border:1px solid var(--gold);
    border-radius:7px; padding:6px 9px; font-size:11px; line-height:1.5; display:none; z-index:20;
    font-variant-numeric:tabular-nums; white-space:nowrap; }
  #hover .g { color:var(--gold); }
  #tip { position:fixed; pointer-events:none; max-width:250px; background:#1c2530; color:var(--txt);
    border:1px solid var(--accent); border-radius:8px; padding:8px 11px; font-size:11.5px; line-height:1.5;
    display:none; z-index:50; box-shadow:0 6px 24px #000a; }
  #hint { position:absolute; bottom:14px; left:50%; transform:translateX(-50%); font-size:11px; color:var(--mut);
    background:#0d1117aa; padding:5px 12px; border-radius:20px; border:1px solid var(--line); }
  a.src { color:var(--mut); }
  .collapsed .body { display:none !important; }
  @media (max-width:640px){
    #controls { width:calc(100vw - 20px); top:10px; left:10px; padding:11px 13px; max-height:calc(100vh - 20px); }
    #controls h1 { display:flex; align-items:center; font-size:15px; }
    #controls .sub { margin-bottom:10px; }
    .tab { padding:11px 6px; font-size:13px; }
    .toggle { margin:14px 0; } .toggle input { width:18px; height:18px; }
    .row { margin:14px 0 5px; }
    input[type=range] { height:26px; }
    #coords { width:calc(100vw - 20px); left:10px; bottom:10px; padding:11px 13px; }
    #coords h2 { display:flex; align-items:center; margin:0; }
    #coords.collapsed h2 { margin:0; }
    #legend { display:none; }
    #compass { width:48px; height:48px; top:auto; bottom:74px; right:12px; }
    #hint { display:none; }
    #tip { max-width:calc(100vw - 40px); }
  }
</style>
</head>
<body>
<div id="app"></div>

<div id="controls" class="panel">
  <h1>Property topography <span class="caret" id="ctrlCaret" title="Show / hide controls">&#9662;</span></h1>
  <div class="sub">Parcel-shaped 3D terrain &middot; 1&#8202;m USGS 3DEP LiDAR</div>
  <div class="tabs" id="tabs"></div>
  <div class="body" id="ctrlBody">
  <div class="facts" id="facts"></div>

  <div class="row"><label data-tip="Stretches the terrain's height to make gentle slopes easier to read. It does NOT change the real elevation numbers shown below &mdash; it's purely visual. 1&times; is true-to-life.">Vertical exaggeration</label><span class="val" id="exagVal">1.5&times;</span></div>
  <input type="range" id="exag" min="1" max="4" step="0.1" value="1.5">

  <div class="row"><label data-tip="Rotates the simulated sunlight around the compass. Shadows and shading shift so you can pick out ridges, gullies and slope aspect. Measured in degrees clockwise from north.">Sun direction</label><span class="val" id="sunVal">315&deg;</span></div>
  <input type="range" id="sun" min="0" max="360" step="1" value="315">

  <div class="divider"></div>
  <label class="toggle"><input type="checkbox" id="contours" checked><span data-tip="Draws lines connecting points of equal elevation, like a paper topo map. Every 5th line is heavier (an index contour). Closer-spaced lines mean steeper ground.">Contour lines</span></label>
  <div class="row" style="margin-top:6px"><label data-tip="Vertical spacing between contour lines, in meters of elevation. Smaller intervals show more detail but crowd together on steep slopes.">Contour interval</label><span class="val" id="ciVal">2 m</span></div>
  <input type="range" id="ci" min="0" max="4" step="1" value="1">
  <label class="toggle"><input type="checkbox" id="outline" checked><span data-tip="The gold line is the legal property boundary from the official assessor's parcel map, draped onto the 3D surface at its true elevation.">Parcel boundary</span></label>
  <label class="toggle"><input type="checkbox" id="buildings" checked><span data-tip="Real building footprints (FEMA USA Structures / assessor), placed at their true location and extruded to their measured height. Roof heights are LiDAR-derived where available, otherwise estimated from the assessor's story count. Where FEMA splits one house into separate roof sections (its imagery can't see a middle section hidden under tree canopy &mdash; the Cornwall house reads as two), nearby sections are counted as one building and joined by an inferred connector. Blocks are simple flat-roof (LOD1) at true height &mdash; never vertically exaggerated.">Buildings</span></label>
  <label class="toggle"><input type="checkbox" id="roads" checked><span data-tip="Roads and driveways from OpenStreetMap, draped onto the terrain with approximate widths by road type (highway, residential street, driveway). Floating labels mark the named roads.">Roads</span></label>
  <label class="toggle"><input type="checkbox" id="aerial"><span data-tip="Drapes a real aerial photo (Esri World Imagery, ~1 m) over the 3D terrain in place of the elevation color tint &mdash; so you see the actual trees, driveway, roofs and cleared ground. Hillshading still applies.">Aerial photo</span></label>
  <label class="toggle"><input type="checkbox" id="trees"><span data-tip="A translucent green canopy surface at the LiDAR-measured tree height (USGS 2013-14 flights) &mdash; hover it to read the height at any spot. Where the trees are comes from the summer aerial photo; how tall they are comes from LiDAR first returns minus bare earth. Trees have likely grown since 2013. No streams or ponds were found on either parcel.">Trees (canopy)</span></label>
  <label class="toggle"><input type="checkbox" id="labels" checked><span data-tip="North / South / East / West markers placed at the edges of the view. North also aligns with the compass at top-right.">Compass labels</span></label>
  <label class="toggle"><input type="checkbox" id="wire"><span data-tip="Shows the underlying triangular terrain mesh &mdash; every vertex is one ~1&#8202;m LiDAR elevation sample.">Wireframe</span></label>

  <div class="row" style="margin-top:12px"><label data-tip="Preset camera angles. You can also double-click anywhere on the terrain to fly in toward that spot, and scroll to zoom toward the cursor. Spin slowly orbits the model.">Views</label></div>
  <div class="tabs views">
    <div class="tab vbtn active" data-view="oblique">Oblique</div>
    <div class="tab vbtn" data-view="top">Top</div>
    <div class="tab vbtn" data-view="side">Side</div>
    <div class="tab vbtn" id="spinBtn">Spin</div>
  </div>
  </div>
</div>

<div id="coords" class="panel">
  <h2>Coordinates &amp; extent <span class="caret" id="coordCaret" title="Show / hide">&#9662;</span></h2>
  <div class="cgrid body" id="cgrid"></div>
</div>

<div id="legend" class="panel">
  <div data-tip="Color shades the terrain from the lowest elevation in this parcel (left) to the highest (right). It's a relative ramp &mdash; the exact meters are labeled below." style="cursor:help;border-bottom:1px dotted #4c545c;display:inline-block">Elevation</div>
  <div class="bar"></div>
  <div class="ends"><span id="legLo">low</span><span id="legHi">high</span></div>
</div>

<svg id="compass" viewBox="0 0 58 58" data-tip="Points to true north. The red arrow tracks the sun-direction control; the whole scene is oriented so north is toward the far edge.">
  <circle cx="29" cy="29" r="27" fill="#161b22e6" stroke="#30363d"/>
  <g id="needle"><polygon points="29,7 24.5,31 33.5,31" fill="#f85149"/><polygon points="29,51 24.5,31 33.5,31" fill="#8b949e"/></g>
  <text x="29" y="18" text-anchor="middle" font-size="9" fill="#e6edf3" font-weight="700">N</text>
</svg>

<div id="hover"></div>
<div id="tip"></div>
<div id="hint">drag&nbsp;·&nbsp;orbit&nbsp;&nbsp;·&nbsp;&nbsp;scroll&nbsp;·&nbsp;zoom&nbsp;&nbsp;·&nbsp;&nbsp;double-click&nbsp;·&nbsp;fly in&nbsp;&nbsp;·&nbsp;&nbsp;right-drag&nbsp;·&nbsp;pan&nbsp;&nbsp;·&nbsp;&nbsp;hover for lat/long</div>

<script src="terrain_data.js"></script>
<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Line2 } from 'three/addons/lines/Line2.js';
import { LineMaterial } from 'three/addons/lines/LineMaterial.js';
import { LineGeometry } from 'three/addons/lines/LineGeometry.js';

const CI_STEPS = [1, 2, 5, 10, 20];
const RAMP = [[0,[47,107,63]],[0.2,[106,143,60]],[0.42,[184,165,107]],[0.65,[150,110,72]],[0.85,[120,96,80]],[1,[236,240,243]]];
function ramp(t){ t=Math.max(0,Math.min(1,t));
  for(let i=0;i<RAMP.length-1;i++){ const [a,ca]=RAMP[i],[b,cb]=RAMP[i+1];
    if(t<=b){ const f=(t-a)/(b-a); return [ca[0]+(cb[0]-ca[0])*f, ca[1]+(cb[1]-ca[1])*f, ca[2]+(cb[2]-ca[2])*f].map(v=>v/255); } }
  return [1,1,1]; }

const scene = new THREE.Scene();
{ // subtle night-sky gradient instead of flat black
  const cv=document.createElement('canvas'); cv.width=16; cv.height=512;
  const g=cv.getContext('2d'); const gr=g.createLinearGradient(0,0,0,512);
  gr.addColorStop(0,'#141d2a'); gr.addColorStop(0.55,'#0f1620'); gr.addColorStop(1,'#0d1117');
  g.fillStyle=gr; g.fillRect(0,0,16,512);
  const bt=new THREE.CanvasTexture(cv); bt.colorSpace=THREE.SRGBColorSpace;
  scene.background=bt;
}
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.5, 8000);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('app').appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI*0.495;
controls.minDistance = 4;            // get right up to a building
controls.zoomToCursor = true;        // scroll/pinch zooms toward the pointer, not just center
controls.zoomSpeed = 2.0;            // fast wheel zoom on desktop
controls.autoRotateSpeed = 1.1;

scene.add(new THREE.HemisphereLight(0xbcd4ff, 0x20241a, 0.55));
const sun = new THREE.DirectionalLight(0xffffff, 2.0);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.bias = -0.0004;
scene.add(sun); scene.add(sun.target);

let group, uniforms, D, H, N, half, res, zmin, relief, outerRing, tMats=null, CH=null, canopyTyp=0;

function decode(b64){ const bin=atob(b64); const u8=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i); return new Float32Array(u8.buffer); }
function decodeU8(b64){ const bin=atob(b64); const u8=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i); return u8; }
const aerialCache={};
function aerialTex(key,b64){ if(aerialCache[key]) return aerialCache[key];
  const img=new Image(); const t=new THREE.Texture(img);
  t.colorSpace=THREE.SRGBColorSpace; t.anisotropy=8; t.flipY=false;
  img.onload=()=>{ t.needsUpdate=true; }; img.src='data:image/jpeg;base64,'+b64;
  aerialCache[key]=t; return t; }
function inPoly(x,z,ring){ let inside=false;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){ const xi=ring[i][0],zi=ring[i][1],xj=ring[j][0],zj=ring[j][1];
    if(((zi>z)!==(zj>z)) && (x < (xj-xi)*(z-zi)/(zj-zi)+xi)) inside=!inside; } return inside; }
function sampleH(x,z){ let c=(x+half)/res-0.5, r=(z+half)/res-0.5;
  c=Math.max(0,Math.min(N-1,c)); r=Math.max(0,Math.min(N-1,r));
  const c0=Math.floor(c),r0=Math.floor(r),c1=Math.min(c0+1,N-1),r1=Math.min(r0+1,N-1),fc=c-c0,fr=r-r0;
  const a=H[r0*N+c0]+(H[r0*N+c1]-H[r0*N+c0])*fc, b=H[r1*N+c0]+(H[r1*N+c1]-H[r1*N+c0])*fc;
  return (a+(b-a)*fr)-zmin; }
// mesh xz -> lon/lat via bilinear over the tile corners
function lonlat(x,z){ const u=(x+half)/(2*half), v=(z+half)/(2*half), c=D.corners;
  const tLon=c.nw[0]+(c.ne[0]-c.nw[0])*u, tLat=c.nw[1]+(c.ne[1]-c.nw[1])*u;
  const bLon=c.sw[0]+(c.se[0]-c.sw[0])*u, bLat=c.sw[1]+(c.se[1]-c.sw[1])*u;
  return [tLon+(bLon-tLon)*v, tLat+(bLat-tLat)*v]; }
const fmtLat=l=>`${Math.abs(l).toFixed(5)}°${l>=0?'N':'S'}`;
const fmtLon=l=>`${Math.abs(l).toFixed(5)}°${l>=0?'E':'W'}`;

function textSprite(txt,color){
  const cv=document.createElement('canvas'); cv.width=128; cv.height=64; const g=cv.getContext('2d');
  g.font='bold 44px -apple-system,sans-serif'; g.textAlign='center'; g.textBaseline='middle';
  g.fillStyle='rgba(13,17,23,0.72)'; g.beginPath(); g.roundRect(24,10,80,44,10); g.fill();
  g.fillStyle=color; g.fillText(txt,64,34);
  const tx=new THREE.CanvasTexture(cv); tx.anisotropy=4;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tx,depthTest:false,transparent:true}));
  sp.scale.set(26,13,1); return sp; }

function roadLabel(txt){
  const m=document.createElement('canvas').getContext('2d');
  m.font='600 26px -apple-system,sans-serif';
  const w=Math.ceil(m.measureText(txt).width)+26;
  const cv=document.createElement('canvas'); cv.width=w; cv.height=42;
  const g=cv.getContext('2d');
  g.font='600 26px -apple-system,sans-serif'; g.textBaseline='middle';
  g.fillStyle='rgba(13,17,23,0.78)'; g.beginPath(); g.roundRect(0,3,w,36,8); g.fill();
  g.strokeStyle='#3d4650'; g.stroke();
  g.fillStyle='#dce3ea'; g.fillText(txt,13,21);
  const t=new THREE.CanvasTexture(cv); t.anisotropy=4;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:t,depthTest:false,transparent:true}));
  sp.scale.set(w*0.155,6.5,1); sp.renderOrder=3; return sp; }

function build(key){
  D = window.TERRAIN[key];
  N = D.size; half = D.half; res = D.res; zmin = D.zmin; relief = D.zmax - D.zmin;
  H = decode(D.heights_b64);
  const TM = D.tree_b64 ? decodeU8(D.tree_b64) : null;
  CH = D.canopy_b64 ? decodeU8(D.canopy_b64) : null;   // LiDAR canopy height, half-meter units
  outerRing = D.poly_mesh.reduce((a,b)=>b.length>a.length?b:a);
  const ex = parseFloat(exag.value);

  if(group){ scene.remove(group); group.traverse(o=>{ o.geometry&&o.geometry.dispose(); o.material&&o.material.dispose && o.material.dispose(); }); }
  group = new THREE.Group(); scene.add(group);

  // depth fog + shadow frustum sized to this tile
  scene.fog = new THREE.Fog(0x0d1117, half*3.4, half*9);
  const sc=sun.shadow.camera;
  sc.left=-half*1.6; sc.right=half*1.6; sc.top=half*1.6; sc.bottom=-half*1.6;
  sc.near=10; sc.far=Math.max(half*3,600)*2.4; sc.updateProjectionMatrix();

  // ---- clipped terrain mesh ----
  const pos=new Float32Array(N*N*3), col=new Float32Array(N*N*3), elev=new Float32Array(N*N), uv=new Float32Array(N*N*2);
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){ const i=r*N+c;
    const x=-half+(c+0.5)*res, z=-half+(r+0.5)*res, hz=H[i];
    pos[i*3]=x; pos[i*3+1]=hz-zmin; pos[i*3+2]=z; elev[i]=hz;
    uv[i*2]=c/(N-1); uv[i*2+1]=r/(N-1);   // row0=north maps to image top (flipY=false)
    const cc=ramp(relief>0?(hz-zmin)/relief:0.5); col[i*3]=cc[0]; col[i*3+1]=cc[1]; col[i*3+2]=cc[2]; }
  const idx=[];
  for(let r=0;r<N-1;r++)for(let c=0;c<N-1;c++){
    const a=r*N+c,b=r*N+c+1,d=(r+1)*N+c,e=(r+1)*N+c+1;
    const cx=-half+(c+1)*res, cz=-half+(r+1)*res;
    if(inPoly(cx,cz,outerRing)){ idx.push(a,d,b, b,d,e); } }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  geo.setAttribute('uv',new THREE.BufferAttribute(uv,2));
  geo.setAttribute('trueElev',new THREE.BufferAttribute(elev,1));
  geo.setIndex(idx); geo.computeVertexNormals();

  uniforms={ uExag:{value:ex}, uContourOn:{value:contours.checked?1:0}, uInterval:{value:CI_STEPS[+ci.value]} };
  // two materials, swapped in place on toggle so the camera never resets
  const matTint=new THREE.MeshStandardMaterial({vertexColors:true,roughness:0.95,metalness:0,side:THREE.DoubleSide,wireframe:wire.checked});
  const matAerial=new THREE.MeshStandardMaterial({map:aerialTex(key,D.aerial_b64),roughness:0.95,metalness:0,side:THREE.DoubleSide,wireframe:wire.checked});
  const mat=aerial.checked?matAerial:matTint;
  if(tMats){ tMats.tint.dispose(); tMats.aerial.dispose(); }
  tMats={tint:matTint,aerial:matAerial};
  const shaderPatch=(sh)=>{ Object.assign(sh.uniforms,uniforms);
    sh.vertexShader='attribute float trueElev;\nvarying float vE;\nuniform float uExag;\n'+
      sh.vertexShader.replace('#include <begin_vertex>','#include <begin_vertex>\n transformed.y*=uExag;\n vE=trueElev;');
    sh.fragmentShader='varying float vE;\nuniform float uContourOn;\nuniform float uInterval;\n'+
      sh.fragmentShader.replace('#include <dithering_fragment>',
      `#include <dithering_fragment>
       if(uContourOn>0.5){ float e=vE/uInterval; float g=abs(fract(e-0.5)-0.5)/fwidth(e); float ln=1.0-min(g,1.0);
         float e5=vE/(uInterval*5.0); float g5=abs(fract(e5-0.5)-0.5)/fwidth(e5); float ix=1.0-min(g5,1.0);
         gl_FragColor.rgb=mix(gl_FragColor.rgb,vec3(0.05,0.06,0.08),ln*0.5+ix*0.35); }`); };
  matTint.onBeforeCompile=shaderPatch; matAerial.onBeforeCompile=shaderPatch;
  const mesh=new THREE.Mesh(geo,mat);
  mesh.castShadow=true; mesh.receiveShadow=true;
  group.add(mesh);

  // ---- skirt walls along parcel boundary ----
  const base=-Math.max(relief*0.25,6);
  const sv=[];
  for(let i=0;i<outerRing.length-1;i++){ const [x0,z0]=outerRing[i],[x1,z1]=outerRing[i+1];
    const y0=sampleH(x0,z0)*ex, y1=sampleH(x1,z1)*ex;
    sv.push(x0,y0,z0, x1,y1,z1, x1,base,z1,  x0,y0,z0, x1,base,z1, x0,base,z0); }
  const sg=new THREE.BufferGeometry(); sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3)); sg.computeVertexNormals();
  group.add(new THREE.Mesh(sg,new THREE.MeshStandardMaterial({color:0x39322a,roughness:1,metalness:0,side:THREE.DoubleSide})));

  // ---- parcel boundary line (draped) ----
  const lp=[]; for(const [x,z] of outerRing){ lp.push(x, sampleH(x,z)*ex+0.6, z); }
  const lg=new LineGeometry(); lg.setPositions(lp);
  const lm=new LineMaterial({color:0xe3b341,linewidth:3,worldUnits:false,dashed:false});
  lm.resolution.set(innerWidth,innerHeight);
  const line=new Line2(lg,lm); line.computeLineDistances(); line.name='outline'; group.add(line);

  // ---- buildings: extrude real footprints onto the terrain ----
  const bgroup=new THREE.Group(); bgroup.name='buildings';
  const wallMat=new THREE.MeshStandardMaterial({color:0xece6da,roughness:0.85,metalness:0});
  const roofMat=new THREE.MeshStandardMaterial({color:0x8a4b3a,roughness:0.9,metalness:0});
  const edgeMat=new THREE.LineBasicMaterial({color:0x3a2b23});
  const found=2;
  for(const b of (D.buildings||[])){
    const ring=b.mesh; let gmin=Infinity;
    for(const [x,z] of ring){ const g=sampleH(x,z); if(g<gmin) gmin=g; }
    const shape=new THREE.Shape();
    ring.forEach(([x,z],i)=> i? shape.lineTo(x,-z): shape.moveTo(x,-z));
    // buildings render at TRUE height (not exaggerated); only their base sits on the
    // exaggerated terrain, so a 7 m house always looks 7 m regardless of the exag slider.
    const geo=new THREE.ExtrudeGeometry(shape,{depth:b.height+found,bevelEnabled:false});
    geo.rotateX(-Math.PI/2);
    const bm=new THREE.Mesh(geo,[roofMat,wallMat]); bm.position.y=gmin*ex-found;
    bm.castShadow=true; bm.receiveShadow=true;
    bgroup.add(bm);
    const eg=new THREE.LineSegments(new THREE.EdgesGeometry(geo,30),edgeMat); eg.position.copy(bm.position); bgroup.add(eg);
  }
  group.add(bgroup);

  // ---- tree canopy overlay (green where woods, clipped to parcel) ----
  if(TM){
    // canopy surface at the LiDAR-measured tree height (true meters, like buildings)
    const posT=new Float32Array(N*N*3);
    for(let i=0;i<N*N;i++){ const chm=CH?CH[i]/2:0;
      posT[i*3]=pos[i*3]; posT[i*3+1]=(H[i]-zmin)*ex+Math.max(0.4,chm); posT[i*3+2]=pos[i*3+2]; }
    const tIdx=[]; const chVals=[];
    for(let r=0;r<N-1;r++)for(let c=0;c<N-1;c++){
      const a=r*N+c;
      const cx=-half+(c+1)*res, cz=-half+(r+1)*res;
      if(TM[a] && inPoly(cx,cz,outerRing)){ const b=r*N+c+1,d=(r+1)*N+c,e=(r+1)*N+c+1; tIdx.push(a,d,b, b,d,e);
        if(CH&&CH[a]>=4) chVals.push(CH[a]/2); } }
    chVals.sort((x,y)=>x-y);
    canopyTyp=chVals.length?chVals[Math.floor(chVals.length*0.5)]:0;
    const tg=new THREE.BufferGeometry();
    tg.setAttribute('position',new THREE.BufferAttribute(posT,3)); tg.setIndex(tIdx); tg.computeVertexNormals();
    const tmesh=new THREE.Mesh(tg,new THREE.MeshStandardMaterial({color:0x2f7d32,roughness:0.9,metalness:0,
      transparent:true,opacity:0.62,side:THREE.DoubleSide,depthWrite:false}));
    tmesh.name='trees'; tmesh.renderOrder=2; group.add(tmesh);
  }

  // ---- roads: OSM ways draped as ribbons, name labels floated above ----
  const rgroup=new THREE.Group(); rgroup.name='roads';
  const ROADW={trunk:9,primary:8,secondary:7,tertiary:6,unclassified:5,residential:5,service:2.8,track:2.5,path:1.5,footway:1.5};
  const roadMat=new THREE.MeshStandardMaterial({color:0x767c88,roughness:0.9,metalness:0,side:THREE.DoubleSide});
  const inTile=(x,z)=>Math.abs(x)<half-0.5&&Math.abs(z)<half-0.5;
  for(const rd of (D.roads||[])){
    const w=ROADW[rd.kind]||4;
    // subdivide (~4 m) so the ribbon follows the terrain, split into inside-tile runs
    const runs=[]; let cur=[];
    for(let i=0;i<rd.pts.length-1;i++){
      const [x0,z0]=rd.pts[i],[x1,z1]=rd.pts[i+1];
      const steps=Math.max(1,Math.ceil(Math.hypot(x1-x0,z1-z0)/4));
      for(let s=0;s<steps;s++){ const t=s/steps, x=x0+(x1-x0)*t, z=z0+(z1-z0)*t;
        if(inTile(x,z)) cur.push([x,z]); else if(cur.length){ runs.push(cur); cur=[]; } }
    }
    const le=rd.pts[rd.pts.length-1]; if(inTile(le[0],le[1])) cur.push(le);
    if(cur.length>1) runs.push(cur);
    for(const run of runs){
      if(run.length<2) continue;
      const verts=[], idxs=[];
      for(let i=0;i<run.length;i++){
        const [x,z]=run[i];
        const [xp,zp]=run[Math.max(0,i-1)], [xn,zn]=run[Math.min(run.length-1,i+1)];
        let dx=xn-xp,dz=zn-zp; const L=Math.hypot(dx,dz)||1; dx/=L; dz/=L;
        const y=sampleH(x,z)*ex+0.35;
        verts.push(x-dz*w/2,y,z+dx*w/2, x+dz*w/2,y,z-dx*w/2);
        if(i<run.length-1){ const a=i*2; idxs.push(a,a+1,a+2, a+1,a+3,a+2); }
      }
      const rg=new THREE.BufferGeometry();
      rg.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
      rg.setIndex(idxs); rg.computeVertexNormals();
      const rm=new THREE.Mesh(rg,roadMat); rm.receiveShadow=true; rgroup.add(rm);
    }
  }
  const seenNames=new Set();
  for(const rd of (D.roads||[])){
    if(!rd.name||seenNames.has(rd.name)) continue;
    let best=null,bd=Infinity;
    for(const [x,z] of rd.pts){ if(!inTile(x,z)) continue; const dd=x*x+z*z; if(dd<bd){bd=dd;best=[x,z];} }
    if(!best) continue;
    seenNames.add(rd.name);
    const sp=roadLabel(rd.name);
    sp.position.set(best[0], sampleH(best[0],best[1])*ex+8, best[1]);
    rgroup.add(sp);
  }
  group.add(rgroup);

  // ---- N/S/E/W labels ----
  const yLab=relief*ex*0.5+8, off=half+12;
  const labs=new THREE.Group(); labs.name='labels';
  const L=[['N',0,-off],['S',0,off],['E',off,0],['W',-off,0]];
  for(const [t,x,z] of L){ const s=textSprite(t,t==='N'?'#f85149':'#e6edf3'); s.position.set(x,yLab,z); labs.add(s); }
  // 50 m scale bar along the south edge
  const barY=sampleH(half-2,half-40)*ex;
  const bar=new THREE.Mesh(new THREE.BoxGeometry(1.8,0.8,50),
    new THREE.MeshBasicMaterial({color:0xc9d1d9}));
  bar.position.set(half+10,barY+1.2,half-40);
  labs.add(bar);
  const bl=roadLabel('50 m'); bl.position.set(half+10,barY+8,half-40); labs.add(bl);
  group.add(labs);

  applyToggles();
  document.getElementById('legLo').textContent=D.zmin.toFixed(0)+' m';
  document.getElementById('legHi').textContent=D.zmax.toFixed(0)+' m';
  // frame: bird's-eye 3/4 view that fits the whole tile
  const topH=relief*ex;
  const R=half*1.4;
  const fit=R/Math.sin(THREE.MathUtils.degToRad(camera.fov/2));
  controls.target.set(0,topH*0.4,0);
  const dir=new THREE.Vector3(0.62,0.58,0.62).normalize();
  camera.position.copy(controls.target).addScaledVector(dir,fit);
  controls.maxDistance=half*7;
  controls.update();
  document.querySelectorAll('.vbtn[data-view]').forEach(x=>x.classList.toggle('active',x.dataset.view==='oblique'));
  updateSun(); fillFacts(); fillCoords();
}

function applyToggles(){ if(!group) return;
  const g=n=>group.getObjectByName(n);
  g('outline') && (g('outline').visible=outline.checked);
  g('labels') && (g('labels').visible=labels.checked);
  g('buildings') && (g('buildings').visible=buildings.checked);
  g('roads') && (g('roads').visible=roads.checked);
  g('trees') && (g('trees').visible=trees.checked); }

function updateSun(){ const az=parseFloat(sun_.value)*Math.PI/180, el=42*Math.PI/180, r=Math.max(half*3,600);
  sun.position.set(Math.sin(az)*Math.cos(el)*r, Math.sin(el)*r, Math.cos(az)*Math.cos(el)*r);
  document.getElementById('needle').setAttribute('transform',`rotate(${-parseFloat(sun_.value)} 29 29)`); }

function fillFacts(){ document.getElementById('facts').innerHTML=
  `<div><span class="k">Address</span><b>${D.label}</b></div>`+
  `<div><span class="k">Town</span><b>${D.town}</b></div>`+
  `<div><span class="k">Parcel</span><b>${D.acres} acres</b> <span style="color:var(--mut)">(assessor: ${D.acres_assessor})</span></div>`+
  `<div><span class="k">Relief</span><b>${relief.toFixed(1)} m</b> <span style="color:var(--mut)">(${(relief*3.281).toFixed(0)} ft) &middot; ${D.zmin.toFixed(0)}–${D.zmax.toFixed(0)} m</span></div>`+
  (D.buildings&&D.buildings.length?(()=>{ const nb=D.n_buildings||D.buildings.length;
    const parts=D.buildings.filter(b=>b.occ!=='connector').length;
    return `<div><span class="k">Buildings</span><b>${nb}</b> <span style="color:var(--mut)">${parts>nb?parts+' roof sections &middot; ':''}tallest ${Math.max(...D.buildings.map(b=>b.height)).toFixed(0)} m &middot; ${D.buildings[0].height_src.includes('LiDAR')?'LiDAR height':'est. height'}</span></div>`; })():'')+
  (()=>{ const rn=[...new Set((D.roads||[]).filter(r=>r.name).map(r=>r.name))];
    return rn.length?`<div><span class="k">Roads</span><b>${rn.join(', ')}</b></div>`:''; })()+
  (canopyTyp?`<div><span class="k">Tree canopy</span><b>~${canopyTyp.toFixed(0)} m</b> <span style="color:var(--mut)">median &middot; LiDAR 2013-14</span></div>`:''); }

function fillCoords(){ const c=D.corners, ctr=D.center_lonlat;
  const nLat=(c.nw[1]+c.ne[1])/2, sLat=(c.sw[1]+c.se[1])/2, eLon=(c.ne[0]+c.se[0])/2, wLon=(c.nw[0]+c.sw[0])/2;
  document.getElementById('cgrid').innerHTML=
    `<span class="lbl" data-tip="Latitude / longitude of the center of the view, in decimal degrees (WGS84).">Center</span><b>${fmtLat(ctr[1])}, ${fmtLon(ctr[0])}</b>`+
    `<span class="lbl" data-tip="Latitude of the northern edge of the terrain tile.">North edge</span><b>${fmtLat(nLat)}</b>`+
    `<span class="lbl" data-tip="Latitude of the southern edge of the terrain tile.">South edge</span><b>${fmtLat(sLat)}</b>`+
    `<span class="lbl" data-tip="Longitude of the eastern edge of the terrain tile.">East edge</span><b>${fmtLon(eLon)}</b>`+
    `<span class="lbl" data-tip="Longitude of the western edge of the terrain tile.">West edge</span><b>${fmtLon(wLon)}</b>`+
    `<span class="lbl" data-tip="Width of the square terrain tile on each side, in meters. The parcel sits inside it.">Tile span</span><b>${(2*half).toFixed(0)} m &times; ${(2*half).toFixed(0)} m</b>`; }

// ---- UI refs ----
const exag=document.getElementById('exag'), sun_=document.getElementById('sun'),
  contours=document.getElementById('contours'), ci=document.getElementById('ci'),
  outline=document.getElementById('outline'), labels=document.getElementById('labels'),
  buildings=document.getElementById('buildings'), wire=document.getElementById('wire'),
  aerial=document.getElementById('aerial'), trees=document.getElementById('trees'),
  roads=document.getElementById('roads');

const tabs=document.getElementById('tabs');
Object.keys(window.TERRAIN).forEach((k,i)=>{ const el=document.createElement('div');
  el.className='tab'+(i===0?' active':''); el.textContent=window.TERRAIN[k].town.split(',')[0];
  el.onclick=()=>{ [...tabs.children].forEach(c=>c.classList.remove('active')); el.classList.add('active'); build(k); };
  tabs.appendChild(el); });

exag.oninput=()=>{ document.getElementById('exagVal').innerHTML=parseFloat(exag.value).toFixed(1)+'&times;'; build(currentKey()); };
sun_.oninput=()=>{ document.getElementById('sunVal').innerHTML=sun_.value+'&deg;'; updateSun(); };
contours.onchange=()=>{ if(uniforms) uniforms.uContourOn.value=contours.checked?1:0; };
ci.oninput=()=>{ const v=CI_STEPS[+ci.value]; document.getElementById('ciVal').textContent=v+' m'; if(uniforms) uniforms.uInterval.value=v; };
outline.onchange=applyToggles; labels.onchange=applyToggles; buildings.onchange=applyToggles;
trees.onchange=applyToggles; roads.onchange=applyToggles;
aerial.onchange=()=>{ const m=group&&group.children[0];
  if(m&&tMats) m.material=aerial.checked?tMats.aerial:tMats.tint; };

// ---- camera flights: view presets, spin, double-click zoom ----
let tween=null;
function flyTo(pos,tgt,dur=750){
  tween={p0:camera.position.clone(),p1:pos,t0:controls.target.clone(),t1:tgt,s:performance.now(),d:dur}; }
function viewPreset(kind){
  const ex=parseFloat(exag.value), topH=relief*ex;
  const R=half*1.4, fit=R/Math.sin(THREE.MathUtils.degToRad(camera.fov/2));
  const tgt=new THREE.Vector3(0,topH*0.4,0);
  let dir, d=fit;
  if(kind==='top'){ dir=new THREE.Vector3(0.02,1,0.02); d=fit*0.92; }
  else if(kind==='side'){ dir=new THREE.Vector3(0.94,0.2,0.28); }
  else { dir=new THREE.Vector3(0.62,0.58,0.62); }
  flyTo(tgt.clone().addScaledVector(dir.normalize(),d),tgt);
}
document.querySelectorAll('.vbtn[data-view]').forEach(b=>{
  b.onclick=()=>{ document.querySelectorAll('.vbtn[data-view]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); viewPreset(b.dataset.view); };
});
const spinBtn=document.getElementById('spinBtn');
spinBtn.onclick=()=>{ controls.autoRotate=!controls.autoRotate; spinBtn.classList.toggle('active',controls.autoRotate); };
renderer.domElement.addEventListener('dblclick',e=>{
  ptr.x=(e.clientX/innerWidth)*2-1; ptr.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(ptr,camera);
  const m=group&&group.children[0]; const hit=m?ray.intersectObject(m,false):[];
  if(!hit.length) return;
  const p=hit[0].point;
  const off=camera.position.clone().sub(controls.target).multiplyScalar(0.35);
  flyTo(p.clone().add(off),p,650);
});
wire.onchange=()=>{ if(tMats){ tMats.tint.wireframe=wire.checked; tMats.aerial.wireframe=wire.checked; } };
function currentKey(){ return Object.keys(window.TERRAIN)[[...tabs.children].findIndex(c=>c.classList.contains('active'))]; }

// ---- collapsible panels (esp. mobile) ----
const isMobile = matchMedia('(max-width:640px)').matches;
function wireCollapse(panelId, caretId){
  const panel=document.getElementById(panelId), caret=document.getElementById(caretId);
  const set=on=>{ panel.classList.toggle('collapsed',on); caret.innerHTML=on?'&#9656;':'&#9662;'; };
  caret.addEventListener('click',e=>{ e.stopPropagation(); set(!panel.classList.contains('collapsed')); });
  if(isMobile) set(true);
}
wireCollapse('controls','ctrlCaret');
wireCollapse('coords','coordCaret');

// ---- hover: lat/long/elevation readout ----
const ray=new THREE.Raycaster(), ptr=new THREE.Vector2(), hoverEl=document.getElementById('hover');
renderer.domElement.addEventListener('pointermove',(e)=>{
  ptr.x=(e.clientX/innerWidth)*2-1; ptr.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(ptr,camera); const m=group&&group.children[0];
  const hit=m?ray.intersectObject(m,false):[];
  if(hit.length){ const p=hit[0].point; const [lo,la]=lonlat(p.x,p.z); const el=sampleH(p.x,p.z)+zmin;
    const touch=e.pointerType==='touch';
    let chm=0;
    if(CH){ const c=Math.round((p.x+half)/res-0.5), r=Math.round((p.z+half)/res-0.5);
      if(c>=0&&c<N&&r>=0&&r<N) chm=CH[r*N+c]/2; }
    hoverEl.style.display='block';
    let hx=e.clientX+14; if(hx+150>innerWidth) hx=e.clientX-150;
    hoverEl.style.left=hx+'px'; hoverEl.style.top=(touch?e.clientY-72:e.clientY+14)+'px';
    hoverEl.innerHTML=`<span class="g">${fmtLat(la)}</span><br><span class="g">${fmtLon(lo)}</span><br>elev <b>${el.toFixed(1)} m</b> (${(el*3.281).toFixed(0)} ft)`+
      (chm>=1.5?`<br>canopy <b>~${chm.toFixed(0)} m</b>`:''); }
  else hoverEl.style.display='none'; });
renderer.domElement.addEventListener('pointerleave',()=>hoverEl.style.display='none');
renderer.domElement.addEventListener('pointerup',e=>{ if(e.pointerType==='touch') setTimeout(()=>hoverEl.style.display='none',1500); });

// ---- explanatory tooltips ----
const tip=document.getElementById('tip'); let tipTgt=null;
document.addEventListener('pointerover',e=>{ const t=e.target.closest('[data-tip]'); if(t){ tipTgt=t; tip.textContent=t.getAttribute('data-tip'); tip.style.display='block'; } });
document.addEventListener('pointermove',e=>{ if(tip.style.display==='block'){ let x=e.clientX+14,y=e.clientY+14;
  if(x+tip.offsetWidth>innerWidth) x=e.clientX-tip.offsetWidth-14; tip.style.left=x+'px'; tip.style.top=y+'px'; } });
document.addEventListener('pointerout',e=>{ if(e.target.closest('[data-tip]')===tipTgt){ tip.style.display='none'; tipTgt=null; } });

addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); const l=group&&group.getObjectByName('outline'); if(l) l.material.resolution.set(innerWidth,innerHeight); });

renderer.domElement.addEventListener('pointerdown',()=>tween=null);
renderer.domElement.addEventListener('wheel',()=>tween=null,{passive:true});
function animate(){ requestAnimationFrame(animate);
  if(tween){ const k=Math.min(1,(performance.now()-tween.s)/tween.d);
    const e=k<0.5?2*k*k:-1+(4-2*k)*k;
    camera.position.lerpVectors(tween.p0,tween.p1,e);
    controls.target.lerpVectors(tween.t0,tween.t1,e);
    if(k>=1) tween=null; }
  controls.update(); renderer.render(scene,camera); }
build(Object.keys(window.TERRAIN)[0]); animate();
</script>
</body>
</html>
